name: CxFlow

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read
      issues: write
      pull-requests: write
      security-events: write

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Fail fast if a required secret is missing/empty (this is what caused your "cx-project" error)
      - name: Validate Checkmarx inputs
        shell: bash
        env:
          CHECKMARX_PROJECT: ${{ secrets.CHECKMARX_PROJECT }}
          CHECKMARX_TEAMS: ${{ secrets.CHECKMARX_TEAMS }}
          CHECKMARX_URL: ${{ secrets.CHECKMARX_URL }}
          CHECKMARX_USERNAME: ${{ secrets.CHECKMARX_USERNAME }}
          CHECKMARX_PASSWORD: ${{ secrets.CHECKMARX_PASSWORD }}
        run: |
          set -euo pipefail
          for v in CHECKMARX_PROJECT CHECKMARX_TEAMS CHECKMARX_URL CHECKMARX_USERNAME CHECKMARX_PASSWORD; do
            if [[ -z "${!v}" ]]; then
              echo "::error::$v is missing or empty. Check repo Secrets (Settings → Secrets and variables → Actions)."
              exit 1
            fi
          done

      - name: Checkmarx CxFlow Action
        uses: checkmarx-ts/checkmarx-cxflow-github-action@49d8269b14ca87910ba003d47a31fa0c7a11f2fe
        with:
          project: ${{ secrets.CHECKMARX_PROJECT }}
          team: ${{ secrets.CHECKMARX_TEAMS }}
          checkmarx_url: ${{ secrets.CHECKMARX_URL }}
          checkmarx_username: ${{ secrets.CHECKMARX_USERNAME }}
          checkmarx_password: ${{ secrets.CHECKMARX_PASSWORD }}
          checkmarx_client_secret: ${{ secrets.CHECKMARX_CLIENT_SECRET }}
          scanners: sast
          params: >-
            --cx-project=${{ secrets.CHECKMARX_PROJECT }}
            --namespace=${{ github.repository_owner }}
            --repo-name=${{ github.event.repository.name }}
            --branch=${{ github.ref }}
            --cx-flow.filter-severity
            --cx-flow.filter-category
            --checkmarx.disable-clubbing=true
            --repo-url=${{ github.api_url }}/repos/${{ github.repository }}

      - name: Verify SARIF exists
        shell: bash
        run: |
          set -euo pipefail
          ls -la
          test -f cx.sarif

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: cx.sarif
          category: checkmarx
