name: CodeQL

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: '0 3 * * 1'

jobs:
  analyze:
    runs-on: macos-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v3
        with:
          languages: swift

      - uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v3
