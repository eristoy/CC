name: AbletonBackup
options:
  deploymentTarget:
    macOS: "14.0"
  defaultConfig: Debug
  generateEmptyDirectories: true
  xcodeVersion: "16"
  swiftVersion: "6.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    SWIFT_STRICT_CONCURRENCY: complete
packages:
  AbletonBackup:
    path: .
targets:
  AbletonBackup:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - AbletonBackup
    info:
      path: AbletonBackup/Info.plist
    entitlements:
      path: AbletonBackup/AbletonBackup.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ericwaetke.AbletonBackup
        INFOPLIST_FILE: AbletonBackup/Info.plist
        CODE_SIGN_ENTITLEMENTS: AbletonBackup/AbletonBackup.entitlements
        SWIFT_VERSION: 6.0
        SWIFT_STRICT_CONCURRENCY: complete
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: AbletonBackup
        product: BackupEngine
schemes:
  AbletonBackup:
    build:
      targets:
        AbletonBackup: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
